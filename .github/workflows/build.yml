# ===================================================================
# WPS 磁盘清理工具 - GitHub Actions 构建流水线
#
# 触发方式：
#   - 推送 tag (v*)     → 构建 + 发布 Release
#   - 手动 workflow_dispatch → 可选构建
#
# 产出物：
#   - WPS-Cleanup-Setup.exe   (Inno Setup 安装包)
#   - WPS-Cleanup-Portable.zip (免安装便携版)
# ===================================================================

name: Build Windows App

on:
  push:
    tags:
      - "v*"             # 推送 v1.0.0、v2.1.3 等 tag 时触发
  workflow_dispatch:      # 允许手动触发

jobs:
  build:
    runs-on: windows-latest   # 关键：Windows 构建环境
    strategy:
      matrix:
        arch: [x64]           # 可扩展为 [x64, x86]

    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 设置 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"       # 3.12 对 PyInstaller 兼容性好
          architecture: ${{ matrix.arch }}

      # 3. 安装构建依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      # 4. 生成应用图标 (从 emoji 生成 .ico)
      - name: Generate app icon
        run: python scripts/generate_icon.py

      # 5. 用 PyInstaller 打包为单文件 exe
      - name: Build with PyInstaller
        run: |
          pyinstaller `
            --onefile `                    # 单一 exe 文件
            --windowed `                   # Windows GUI 模式（无控制台）
            --name "WPS-Cleanup" `
            --icon "assets/icon.ico" `
            --add-data "wps_cleanup;wps_cleanup" `
            --noconfirm `
            --clean `
            main.py

      # 6. 创建便携版 (zip)
      - name: Package portable
        run: |
          mkdir -p dist/portable
          Copy-Item dist/WPS-Cleanup.exe dist/portable/
          Copy-Item README.md dist/portable/
          Compress-Archive `
            -Path dist/portable/* `
            -DestinationPath dist/WPS-Cleanup-Portable.zip

      # 7. 制作安装包 (Inno Setup)
      - name: Build installer
        run: |
          # 下载 Inno Setup (无头模式)
          curl -L -o is.exe "https://jrsoftware.org/download.php/is.exe"
          ./is.exe /VERYSILENT /SUPPRESSMSGBOXES /NORESTART /DIR="C:\innosetup"
          # 编译安装脚本
          & "C:\innosetup\ISCC.exe" scripts/setup.iss

      # 8. 上传构建产物 (供 Release 使用)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WPS-Cleanup-${{ github.ref_name }}
          path: |
            dist/WPS-Cleanup.exe
            dist/WPS-Cleanup-Portable.zip
            dist/WPS-Cleanup-Setup.exe

  # ============================
  # 发布 GitHub Release
  # ============================
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: WPS-Cleanup-${{ github.ref_name }}
          path: release-artifacts

      - name: Generate release notes
        run: |
          echo "## 更新内容" > release-notes.md
          echo "" >> release-notes.md
          echo "- WPS 磁盘缓存/备份清理工具 v${{ github.ref_name }}" >> release-notes.md
          echo "- 支持插件缓存、本地备份、云文档缓存、功能缓存清理" >> release-notes.md
          echo "- 清理报告：逐项明细 + 文件列表 + 搜索 + 导出" >> release-notes.md
          echo "" >> release-notes.md
          echo "### 文件说明" >> release-notes.md
          echo "- \`WPS-Cleanup.exe\` — 独立可执行文件，直接运行" >> release-notes.md
          echo "- \`WPS-Cleanup-Portable.zip\` — 便携版，解压即用" >> release-notes.md
          echo "- \`WPS-Cleanup-Setup.exe\` — 安装包，带开始菜单快捷方式" >> release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "WPS 清理工具 ${{ github.ref_name }}"
          body_path: release-notes.md
          files: |
            release-artifacts/WPS-Cleanup.exe
            release-artifacts/WPS-Cleanup-Portable.zip
            release-artifacts/WPS-Cleanup-Setup.exe
