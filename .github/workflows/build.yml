# ===================================================================
# WPS 磁盘清理工具 - GitHub Actions 构建流水线
#
# 触发方式：
#   - 推送到 main 分支    → 构建 exe + zip（不发布 Release）
#   - 推送 tag (v*)       → 构建 + 自动发布 GitHub Release
#   - 手动 workflow_dispatch → 随时构建
#
# 产出物：
#   - WPS-Cleanup.exe           单文件，双击运行
#   - WPS-Cleanup-Portable.zip  便携版，解压即用
#   - WPS-Cleanup-Setup.exe     安装包（仅 Release）
# ===================================================================

name: Build Windows App

on:
  push:
    branches: [main]         # 推 main 触发构建
    tags: ["v*"]             # 推 tag 触发构建 + Release
  pull_request:
    branches: [main]         # PR 触发构建（验证不翻车）
  workflow_dispatch:          # 手动触发

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh           # 统一用 PowerShell

    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 设置 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. 安装构建依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller ruff

      # 4. ruff 代码检查（lint 不过则构建不通过）
      - name: Lint with ruff
        run: ruff check --output-format=github

      # 5. 生成应用图标
      - name: Generate app icon
        run: python scripts/generate_icon.py

      # 6. PyInstaller 打包为单文件 exe
      - name: Build with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "WPS-Cleanup" `
            --icon "assets/icon.ico" `
            --add-data "wps_cleanup;wps_cleanup" `
            --noconfirm `
            --clean `
            main.py

      # 7. 创建便携版 zip
      - name: Package portable
        run: |
          New-Item -ItemType Directory -Force -Path dist/portable
          Copy-Item dist/WPS-Cleanup.exe dist/portable/
          Copy-Item README.md dist/portable/
          Compress-Archive -Path dist/portable/* -DestinationPath dist/WPS-Cleanup-Portable.zip

      # 8. 上传构建产物
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WPS-Cleanup-${{ github.sha }}
          path: |
            dist/WPS-Cleanup.exe
            dist/WPS-Cleanup-Portable.zip

  # ============================
  # 安装包 + GitHub Release（仅 tag 推送）
  # ============================
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write          # 允许创建 Release
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built exe
        uses: actions/download-artifact@v4
        with:
          name: WPS-Cleanup-${{ github.sha }}
          path: dist

      # 安装 Inno Setup + 下载中文语言文件 + 编译安装包
      - name: Build installer
        run: |
          # 下载 Inno Setup 便携版
          Invoke-WebRequest -Uri "https://jrsoftware.org/download.php/is.exe" -OutFile "is.exe"
          Start-Process -FilePath "is.exe" -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/DIR=C:\innosetup" -Wait
          # 下载中文语言文件（便携版不含）
          New-Item -ItemType Directory -Force -Path C:\innosetup\Languages
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/ChineseSimplified.isl" -OutFile "C:\innosetup\Languages\ChineseSimplified.isl"
          & "C:\innosetup\ISCC.exe" scripts/setup.iss

      - name: Generate release notes
        run: |
          @"
          ## 下载说明

          | 文件 | 说明 |
          |------|------|
          | WPS-Cleanup.exe | 单文件版，下载后直接运行 |
          | WPS-Cleanup-Portable.zip | 便携版，解压到任意目录即可使用 |
          | WPS-Cleanup-Setup.exe | 安装版，带开始菜单和卸载程序 |

          ---
          **更新内容**
          "@ > release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "WPS 清理工具 ${{ github.ref_name }}"
          body_path: release-notes.md
          files: |
            dist/WPS-Cleanup.exe
            dist/WPS-Cleanup-Portable.zip
            dist/WPS-Cleanup-Setup.exe
